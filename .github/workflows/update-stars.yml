name: Update Star Feed

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: star-feed-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAR_FEED_USER: 354685856-sn
          STAR_FEED_REPO_URL: https://github.com/354685856-sn/star-feed
        run: python3 scripts/update_star_feed.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No star feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .star-feed/*.json .star-feed/*.xml snapshots/*.md README.md
          git commit -m "Update GitHub star feed"
          git pull --rebase origin main
          git push
